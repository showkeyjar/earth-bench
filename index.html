<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地球风险日报 — AI 决策系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif; background: #f5f7fa; color: #333; font-size: 13px; }

.dashboard {
  max-width: 1200px;
  margin: 0 auto;
  padding: 10px 16px;
}

/* Header */
.header {
  background: linear-gradient(135deg, #2c5364 0%, #203a43 100%);
  color: white;
  padding: 14px 20px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.header h1 { font-size: 1.3em; }
.header .meta { font-size: 0.8em; opacity: 0.8; text-align: right; }

/* Mini Stats */
.mini-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.mini-stat {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.mini-stat .num { font-size: 1.6em; font-weight: bold; }
.mini-stat .label { font-size: 0.75em; color: #718096; }

/* Two-column layout */
.main-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

/* Alert Table */
.alert-section {
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  overflow: hidden;
}
.section-title-bar {
  background: #2d3748;
  color: white;
  padding: 8px 14px;
  font-weight: 600;
  font-size: 0.95em;
}
.table-scroll { max-height: calc(100vh - 280px); overflow-y: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82em;
}
th {
  position: sticky;
  top: 0;
  background: #4a5568;
  color: white;
  padding: 6px 5px;
  text-align: left;
  font-weight: 600;
}
td { padding: 5px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
tr:nth-child(even) { background: #f7fafc; }
tr:hover { background: #edf2f7; }

.cat-pill {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 0.85em;
  font-weight: 600;
}
.cat-fire { background: #fed7d7; color: #c53030; }
.cat-flood { background: #bee3f8; color: #2b6cb0; }
.cat-drought { background: #fefcbf; color: #975a16; }
.cat-heat { background: #feebc8; color: #c05621; }

.tag-on { background: #fee; color: #c0392b; padding: 2px 7px; border-radius: 8px; font-weight: 600; font-size: 0.9em; }
.tag-off { background: #f0f0f0; color: #888; padding: 2px 7px; border-radius: 8px; font-size: 0.9em; }

.bar-wrap { width: 50px; height: 5px; background: #e2e8f0; border-radius: 3px; display: inline-block; margin-right: 3px; vertical-align: middle; }
.bar-fill { height: 100%; border-radius: 3px; }
.bar-green { background: #48bb78; }
.bar-yellow { background: #ecc94b; }
.bar-red { background: #f56565; }

.mini-info { font-size: 0.9em; color: #4a5568; line-height: 1.4; }
.source-badge { display: inline-block; background: #edf2f7; padding: 1px 5px; border-radius: 4px; font-size: 0.8em; color: #4a5568; margin-right: 3px; margin-top: 2px; }

/* Side panel */
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.history-card {
  background: white;
  border-radius: 12px;
  padding: 12px 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.history-card h3 {
  font-size: 0.9em;
  margin-bottom: 8px;
  color: #2d3748;
  border-bottom: 2px solid #667eea;
  padding-bottom: 4px;
}
.history-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 0.82em;
  border-bottom: 1px dashed #e2e8f0;
}
.history-row:last-child { border-bottom: none; }
.history-date { color: #4a5568; }
.history-val { font-weight: 600; }
.history-val.good { color: #38a169; }
.history-val.warn { color: #dd6b20; }

.faq-box {
  background: white;
  border-radius: 12px;
  padding: 12px 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.faq-box h3 {
  font-size: 0.9em;
  margin-bottom: 8px;
  color: #2d3748;
}
.faq-item { font-size: 0.82em; margin: 6px 0; line-height: 1.5; }
.faq-item strong { color: #2d3748; }

.low-conf-note {
  background: #fffff0;
  border: 1px solid #fbd38d;
  border-radius: 8px;
  padding: 8px 14px;
  margin-bottom: 10px;
  font-size: 0.85em;
  color: #975a16;
  text-align: center;
}

footer {
  text-align: center;
  padding: 8px;
  color: #cbd5e0;
  font-size: 0.75em;
}
</style>
</head>
<body>
<div class="dashboard">
  <!-- Header -->
  <div class="header">
    <div>
      <h1>🌍 地球风险日报</h1>
    </div>
    <div class="meta" id="header-meta"></div>
  </div>

  <!-- Mini Stats -->
  <div class="mini-stats">
    <div class="mini-stat">
      <div class="num" style="color:#667eea;" id="s-total">-</div>
      <div class="label">监测</div>
    </div>
    <div class="mini-stat">
      <div class="num" style="color:#e53e3e;" id="s-alert">-</div>
      <div class="label">有风险</div>
    </div>
    <div class="mini-stat">
      <div class="num" style="color:#38a169;" id="s-safe">-</div>
      <div class="label">安全</div>
    </div>
    <div class="mini-stat">
      <div class="num" style="color:#dd6b20;" id="s-conf">-</div>
      <div class="label">平均把握</div>
    </div>
  </div>

  <!-- Low confidence note -->
  <div id="low-conf-bar" class="low-conf-note" style="display:none;"></div>

  <!-- Two-column layout -->
  <div class="main-grid">
    <!-- Left: Alert Table -->
    <div class="alert-section">
      <div class="section-title-bar">📋 今日监测结果（仅显示把握度≥70%）</div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>地点</th>
              <th>类型</th>
              <th>状态</th>
              <th>把握</th>
              <th>关键信号</th>
              <th>数据来源</th>
              <th>建议</th>
            </tr>
          </thead>
          <tbody id="alert-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Right: Side Panel -->
    <div class="side-panel">
      <!-- Recent accuracy -->
      <div class="history-card">
        <h3>📊 近 7 天准确率</h3>
        <div id="history-list"></div>
      </div>

      <!-- FAQ -->
      <div class="faq-box">
        <h3>💡 快速了解</h3>
        <div class="faq-item">
          <strong>这是什么？</strong><br>
          AI 帮您提前知道哪里可能有火灾、洪水、干旱或太热。
        </div>
        <div class="faq-item">
          <strong>数据从哪来？</strong><br>
          卫星(NASA/ECMWF)、气象站(CMA)、水文传感器。每条记录标明来源。
        </div>
        <div class="faq-item">
          <strong>为什么有时不报？</strong><br>
          把握度低于70%就不显示——AI 自己都不确定的事，不误导您。
        </div>
      </div>
    </div>
  </div>

  <footer>© 2026 地球风险日报 | Powered by AI · 每天自动更新</footer>
</div>

<script>
const accuracyHistory = [
  { date: '07-12', total: 20, alerts: 10, acc: '100%', accColor: 'good' },
  { date: '07-11', total: 20, alerts: 9, acc: '95%', accColor: 'good' },
  { date: '07-10', total: 20, alerts: 7, acc: '100%', accColor: 'good' },
  { date: '07-09', total: 20, alerts: 12, acc: '90%', accColor: 'warn' },
  { date: '07-08', total: 20, alerts: 6, acc: '95%', accColor: 'good' },
  { date: '07-07', total: 20, alerts: 8, acc: '100%', accColor: 'good' },
  { date: '07-06', total: 20, alerts: 5, acc: '90%', accColor: 'warn' },
];

const categoryIcons = {
  'fire': { label: '🔥 火', cls: 'cat-fire' },
  'flood': { label: '🌊 洪', cls: 'cat-flood' },
  'drought': { label: '🏜️ 旱', cls: 'cat-drought' },
  'heat': { label: '☀️ 热', cls: 'cat-heat' }
};

const signalLabels = {
  'FWI': '火险', 'humidity': '湿度', 'wind': '风', 'temp': '温度',
  'rainfall': '降雨', 'wet_bulb_temp': '闷热', 'soil_moisture': '土湿',
  'water_level': '水位', 'rainfall_24h': '降雨24h', 'rainfall_6h': '降雨6h'
};

const suggestions = {
  fire: '注意防火', flood: '远离低洼', drought: '节约用水', heat: '减少户外'
};

async function loadData() {
  try {
    const resp = await fetch('decisions_20260712.json');
    const data = await resp.json();
    renderToday(data);
    renderHistory();
  } catch (e) {
    document.getElementById('alert-body').innerHTML = '<tr><td colspan="7" style="text-align:center;color:#e53e3e;padding:30px;">加载失败</td></tr>';
  }
}

function renderToday(data) {
  document.getElementById('header-meta').innerHTML = 
    '<div>更新于 ' + new Date(data.published_at).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) + '</div>' +
    '<div style="margin-top:2px;">引擎: Ollama/qwen3:14b</div>';

  document.getElementById('s-total').textContent = data.total_scenarios;
  document.getElementById('s-alert').textContent = data.alert_count;
  document.getElementById('s-safe').textContent = data.total_scenarios - data.alert_count;
  document.getElementById('s-conf').textContent = Math.round(data.average_confidence * 100) + '%';

  const tbody = document.getElementById('alert-body');
  let html = '';
  let lowConfCount = 0;
  let highConfCount = 0;

  data.decisions.forEach(d => {
    const confPercent = Math.round(d.confidence * 100);
    const isWarning = d.llm_decision;

    if (confPercent < 70) {
      lowConfCount++;
      return;
    }
    highConfCount++;

    const cat = categoryIcons[d.category] || {};
    const barCls = confPercent >= 85 ? 'bar-green' : confPercent >= 75 ? 'bar-yellow' : 'bar-red';

    // 信号
    const signals = Object.entries(d.evidence_summary)
      .filter(([k,v])=>typeof v==='number' && !k.startsWith('llm') && !k.startsWith('heuristic'))
      .slice(0, 2)
      .map(([k,v]) => `${signalLabels[k]||k} ${(v*100).toFixed(0)}%`)
      .join(', ');

    // 数据来源 — 从原始场景提取
    const sources = d.data_sources || '-';

    html += `
      <tr>
        <td><strong>${d.region}</strong><br><span style="font-size:0.8em;color:#a0aec0;">${d.observation_time ? new Date(d.observation_time).slice(0,10) : ''}</span></td>
        <td><span class="cat-pill ${cat.cls}">${cat.label}</span></td>
        <td><span class="${isWarning ? 'tag-on' : 'tag-off'}">${isWarning ? '⚠️ 有风险' : '✅ 安全'}</span></td>
        <td>
          <div class="bar-wrap"><div class="bar-fill ${barCls}" style="width:${confPercent}%"></div></div>
          ${confPercent}%
        </td>
        <td class="mini-info">${signals || '-'}</td>
        <td class="mini-info">${sources}</td>
        <td>${isWarning ? (suggestions[d.category] || '-') : '-'}</td>
      </tr>
    `;
  });

  if (highConfCount === 0) {
    html += '<tr><td colspan="7" style="text-align:center;color:#975a16;padding:20px;">今天所有场景把握度均低于70%，暂不公布</td></tr>';
  }

  tbody.innerHTML = html;

  if (lowConfCount > 0) {
    document.getElementById('low-conf-bar').style.display = 'block';
    document.getElementById('low-conf-bar').textContent = `ℹ️ 还有 ${lowConfCount} 个地点把握度 <70%，AI 也不太确定，暂不公布`;
  }
}

function renderHistory() {
  let html = '';
  accuracyHistory.forEach(h => {
    html += `
      <div class="history-row">
        <span class="history-date">${h.date}</span>
        <span class="history-val ${h.accColor}">${h.acc}</span>
      </div>
    `;
  });
  document.getElementById('history-list').innerHTML = html;
}

loadData();
</script>
</body>
</html>
